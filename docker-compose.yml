services:
  main-bot:
    build: .
    container_name: discord-bot-v2
    restart: always
    working_dir: /app
    volumes:
      - /data/compose/129/media:/app/media
    env_file:
      - /data/compose/129/.env
    command: python bot.py

  music-bot:
    build: .
    container_name: discord-music-bot-v2
    restart: always
    working_dir: /app
    volumes:
      - /data/compose/129/media:/app/media
    env_file:
      - /data/compose/129/.env
    command: python music.py

  web-ui:
    build: .
    container_name: discord-sound-web-v2
    restart: always
    working_dir: /app
    ports:
      - "5005:5000"
    volumes:
      - /data/compose/129/media:/app/media
    env_file:
      - /data/compose/129/.env
    command: python web_ui.py


